<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentiX - Analyseur Intelligent</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #00b3d3;
            --dark-bg: #1e1e2f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-light: #ffffff;
            --text-dim: #a0a0b0;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --success: #2ecc71;
            --error: #c51d0a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #161625 100%);
            color: var(--text-light); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }
        .bg-circle {
            position: fixed; width: 400px; height: 400px; border-radius: 50%;
            filter: blur(100px); z-index: -1; animation: float 10s infinite ease-in-out; opacity: 0.5;
        }
        .c1 { top: -100px; left: -100px; background: var(--primary); }
        .c2 { bottom: -100px; right: -100px; background: var(--secondary); animation-delay: 2s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, 50px); } }
        
        .container { width: 95%; max-width: 1100px; margin-top: 60px; padding-bottom: 80px; z-index: 1; }
        header { text-align: center; margin-bottom: 50px; }
        h1 {
            font-size: 3rem; font-weight: 700;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .status-badge {
            display: inline-block; background: rgba(46, 204, 113, 0.2); color: var(--success);
            padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin-top: 10px;
            border: 1px solid rgba(46, 204, 113, 0.3); opacity: 0; transition: opacity 0.5s;
        }
        
        .upload-area {
            background: var(--card-bg); border: 2px dashed var(--primary); border-radius: 24px;
            padding: 60px 20px; text-align: center; cursor: pointer; transition: all 0.3s;
            backdrop-filter: blur(12px); position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .upload-area:hover { border-color: var(--secondary); transform: translateY(-5px); background: rgba(255,255,255,0.08); }
        .upload-area.dragover { border-color: var(--success); background: rgba(46, 204, 113, 0.1); }
        .upload-icon { font-size: 4rem; margin-bottom: 20px; display: block; }
        .upload-text { font-size: 1.5rem; font-weight: 600; color: var(--text-light); }
        .upload-sub { font-size: 1rem; color: var(--text-dim); margin-top: 8px; }
        #fileInput { display: none; }
        
        .loader-container { display: none; flex-direction: column; align-items: center; margin: 40px auto; }
        .loader { width: 50px; height: 50px; border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: var(--secondary); border-radius: 50%; animation: spin 1s linear infinite; }
        .loading-text { margin-top: 15px; color: var(--text-dim); font-size: 0.9rem; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #resultsSection { display: none; margin-top: 40px; animation: slideUp 0.6s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--card-bg); padding: 25px; border-radius: 20px;
            border: var(--glass-border); text-align: center; transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-val { font-size: 2.8rem; font-weight: 700; color: var(--secondary); }
        .stat-label { color: var(--text-dim); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; }
        
        .preview-box {
            background: var(--card-bg); border-radius: 20px; padding: 30px;
            border: var(--glass-border); margin-top: 30px; backdrop-filter: blur(10px);
        }
        .preview-title {
            font-size: 1.3rem; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; font-weight: 600; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        .sentiment-tag { padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .tag-positif { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .tag-negatif { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .tag-neutre { background: rgba(255, 255, 255, 0.1); color: #bdc3c7; }
        /* Conteneur pour le tableau complet avec scroll */
.table-wrapper {
    max-height: 500px;       
    overflow-y: auto;        
    border-radius: 10px;     
    border: 1px solid rgba(255, 255, 255, 0.1);
}

thead th {
    position: sticky;
    top: 0;
    background-color: var(--dark-bg); 
    z-index: 1;
}
    </style>
</head>
<body>
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="container">
        <header>
            <h1>Sentix</h1>
        </header>
        <div class="upload-area" id="dropZone">
            <span class="upload-icon">📁</span>
            <div class="upload-text">Glissez votre fichier ici</div>
            <div class="upload-sub">Supporte Excel (.xlsx) et CSV</div>
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
        </div>
        <div class="loader-container" id="loader">
            <div class="loader"></div>
            <div class="loading-text" id="loadingText">Analyse par le serveur en cours...</div>
        </div>
        <div id="resultsSection">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-val" id="statTotal">0</div>
                    <div class="stat-label">Avis Analysés</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" style="color: #2ecc71" id="statPos">0</div>
                    <div class="stat-label">Positifs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" style="color: #e74c3c" id="statNeg">0</div>
                    <div class="stat-label">Négatifs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" style="color: #f39c12" id="statNeu">0</div>
                    <div class="stat-label">Neutres</div>
                </div>
                </div>
            <div class="preview-box">
                <div class="preview-title">Aperçu des résultats</div>
                <div class="table-container">
                    <table id="resultsTable">
                        <thead>
                            <tr>
                                    <th>Avis</th>
                                    <th>Langue</th>
                                    <th>Sentiment</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <!-- BOUTON TELECHARGEMENT SUPPRIME D'ICI -->
            </div>
        </div>
    </div>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const loader = document.getElementById('loader');
        const resultsSection = document.getElementById('resultsSection');
        const loadingText = document.getElementById('loadingText');
        // Variable downloadBtn supprimée
        
        document.getElementById('modelStatus').style.opacity = '1';

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
        });

        function handleFile(file) {
            dropZone.style.display = 'none';
            loader.style.display = 'flex';
            resultsSection.style.display = 'none';
            loadingText.innerText = `Envoi de ${file.name} au serveur Python...`;

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', { method: 'POST', body: formData })
            .then(response => {
                if (!response.ok) return response.json().then(err => { throw new Error(err.error || 'Erreur serveur'); });
                return response.json();
            })
            .then(data => {
                loadingText.innerText = 'Analyse terminée !';
                displayResults(data);
            })
            .catch(error => {
                alert(`Erreur: ${error.message}`);
                resetUI();
            });
        }

        function displayResults(data) {
            loader.style.display = 'none';
            resultsSection.style.display = 'block';

            document.getElementById('statTotal').innerText = data.total;
            document.getElementById('statPos').innerText = data.distribution.positif || 0;
            document.getElementById('statNeg').innerText = data.distribution.negatif || 0;
            document.getElementById('statNeu').innerText = data.distribution.neutre || 0;


            const tbody = document.querySelector('#resultsTable tbody');
            tbody.innerHTML = '';
            data.preview.forEach(row => {
                const tr = document.createElement('tr');
                let sentimentClass = 'tag-neutre';
                if (row.sentiment_final === 'positif') sentimentClass = 'tag-positif';
                if (row.sentiment_final === 'negatif') sentimentClass = 'tag-negatif';
                
                let text = row.avis;
                if (text && text.length > 60) text = text.substring(0, 60) + '...';

                tr.innerHTML = `
                    <td title="${row.avis}">${text}</td>
                    <td>${row.langue ? row.langue.toUpperCase() : 'N/A'}</td>
                    <td><span class="sentiment-tag ${sentimentClass}">${row.sentiment_final}</span></td>
                `;
                tbody.appendChild(tr);
            });
            
        
        }

        function resetUI() {
            loader.style.display = 'none';
            dropZone.style.display = 'block';
        }
    </script>
</body>

</html>
